<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энергосеть PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .stat-card { background: #1e293b; padding: 15px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-around; }
        #mine-btn { width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, #3b82f6, #1d4ed8); border: 8px solid #1e40af; font-size: 40px; color: white; cursor: pointer; margin: 20px auto; display: flex; align-items: center; justify-content: center; }
        .upgrade-section { background: #1e293b; padding: 15px; border-radius: 15px; margin-top: 20px; }
        button.buy { background: #e11d48; border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .energy-bar { width: 100%; height: 10px; background: #334155; border-radius: 5px; margin-top: 10px; }
        #energy-fill { width: 100%; height: 100%; background: #f59e0b; border-radius: 5px; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="stat-card">
        <div>📜 <span id="bps">0</span></div>
        <div>🔋 <span id="en-txt">100/100</span></div>
    </div>
    <div class="energy-bar"><div id="energy-fill"></div></div>

    <div id="mine-btn">⚡</div>

    <div class="upgrade-section">
        <h3>🛠 МАГАЗИН</h3>
        <p>Уровень инструментов: <span id="lv">1</span></p>
        <p style="font-size: 12px; color: #94a3b8;">След. уровень снизит расход энергии</p>
        <button class="buy" id="buy-upgrade">УЛУЧШИТЬ (50 📜)</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.setText("СОХРАНИТЬ И ВЫЙТИ").setParams({color: "#22c55e"});

        let energy = 100;
        let blueprints = 0;
        let level = 1;
        let cost = 50;

        const mineBtn = document.getElementById('mine-btn');
        const buyBtn = document.getElementById('buy-upgrade');

        mineBtn.onclick = () => {
            let consumption = 11 - level; // Чем выше уровень, тем меньше тратим (10, 9, 8...)
            if (energy >= consumption) {
                energy -= consumption;
                blueprints += 1;
                updateUI();
                tg.HapticFeedback.impactOccurred('medium');
                tg.MainButton.show();
            } else { tg.showAlert("Нет энергии!"); }
        };

        buyBtn.onclick = () => {
            if (blueprints >= cost) {
                blueprints -= cost;
                level++;
                cost *= 2; // Цена растет
                buyBtn.innerText = `УЛУЧШИТЬ (${cost} 📜)`;
                updateUI();
                tg.sendData(JSON.stringify({action: "upgrade", new_level: level, cost: cost/2}));
            } else { tg.showAlert("Недостаточно чертежей!"); }
        };

        function updateUI() {
            document.getElementById('bps').innerText = blueprints;
            document.getElementById('en-txt').innerText = `${energy}/100`;
            document.getElementById('energy-fill').style.width = `${energy}%`;
            document.getElementById('lv').innerText = level;
        }

        tg.MainButton.onClick(() => {
            tg.sendData(JSON.stringify({action: "mine", blueprints_earned: blueprints, current_energy: energy}));
            tg.close();
        });
    </script>
</body>
</html>
