<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энергосеть: Игра</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        #mine-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #3b82f6, #1d4ed8);
            border: 8px solid #1e40af;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            user-select: none;
        }

        #mine-button:active {
            transform: scale(0.95);
        }

        .info {
            margin-top: 20px;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div id="mine-button">⚡ ДОБЫТЬ</div>
    <div class="info">Нажми на кнопку, чтобы отправить<br>чертеж в базу данных</div>

    <script>
        // Инициализируем Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем окно

        const btn = document.getElementById('mine-button');

        btn.addEventListener('click', () => {
            // Подготавливаем данные для отправки
            const data = {
                action: "mine",
                blueprints_earned: 1,
                current_energy: 90 // Для теста передаем фиксированное значение
            };

            // Пытаемся отправить данные боту
            try {
                // Превращаем объект в строку и отправляем
                tg.sendData(JSON.stringify(data));
                
                // Закрываем приложение (важно для срабатывания sendData)
                tg.close();
            } catch (error) {
                alert("Ошибка: " + error.message);
            }
        });
    </script>
</body>
</html>
