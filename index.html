<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Энергосеть Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 50px;
        }

        .stat-item {
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 15px;
            border: 1px solid #334155;
            text-align: center;
        }

        .energy-bar {
            width: 200px;
            height: 20px;
            background: #334155;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .energy-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #f59e0b, #fbbf24);
            transition: width 0.3s;
        }

        #mine-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #3b82f6, #1d4ed8);
            border: 8px solid #1e40af;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            user-select: none;
            transition: transform 0.1s;
        }

        #mine-button:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.8);
        }
    </style>
</head>
<body>

    <div class="stats">
        <div class="stat-item">
            <div>?? Чертежи</div>
            <div id="blueprints">0</div>
        </div>
        <div class="stat-item">
            <div>?? Энергия</div>
            <div id="energy-text">100/100</div>
            <div class="energy-bar"><div id="energy-fill" class="energy-fill"></div></div>
        </div>
    </div>

    <div id="mine-button">? ДОБЫТЬ</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        let energy = 100;
        let blueprints = 0;

        const btn = document.getElementById('mine-button');
        
        btn.addEventListener('click', () => {
            if (energy >= 10) {
                energy -= 10;
                blueprints += 1;
                
                document.getElementById('energy-text').innerText = `${energy}/100`;
                document.getElementById('energy-fill').style.width = `${energy}%`;
                document.getElementById('blueprints').innerText = blueprints;

                tg.HapticFeedback.impactOccurred('medium');

                // МАГИЯ: Отправляем данные боту
                // Мы говорим боту: "Юзер добыл 1 чертеж, у него осталось столько-то энергии"
                let data = {
                    action: "mine",
                    blueprints_earned: 1,
                    current_energy: energy
                };
                
                tg.sendData(JSON.stringify(data)); 
            } else {
                tg.showAlert("Энергия кончилась!");
            }
        });
    </script>
</body>
</html>
